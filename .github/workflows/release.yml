name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify release build
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test -q --locked

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package release archive (unix)
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp "target/$TARGET/release/kagi" dist/kagi
          tar -C dist -czf "kagi-$TAG-$TARGET.tar.gz" kagi
          cp "target/$TARGET/release/kagi" "kagi-$TAG-$TARGET"

      - name: Package release archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/$env:TARGET/release/kagi.exe" "dist/kagi.exe"
          Compress-Archive -Path "dist/kagi.exe" -DestinationPath "kagi-$env:TAG-$env:TARGET.zip" -Force
          Copy-Item "target/$env:TARGET/release/kagi.exe" "kagi-$env:TAG-$env:TARGET.exe"

      - name: Upload packaged assets (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-${{ matrix.target }}
          path: |
            kagi-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            kagi-${{ github.ref_name }}-${{ matrix.target }}

      - name: Upload packaged assets (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-${{ matrix.target }}
          path: |
            kagi-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            kagi-${{ github.ref_name }}-${{ matrix.target }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum * > "kagi-${GITHUB_REF_NAME}-checksums.txt"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
          fi
