name: npm Publish

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify package metadata
        working-directory: npm
        run: |
          npm pack --dry-run

      - name: Verify npm auth
        if: vars.NPM_PUBLISH_ENABLED == 'true'
        run: npm whoami

      - name: Publish package
        if: vars.NPM_PUBLISH_ENABLED == 'true'
        working-directory: npm
        run: npm publish --access public --provenance=false
